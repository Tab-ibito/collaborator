<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Editor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="editor-page">
        <section class="editor-left" aria-label="grid editor panel">
            <section class="grid-panel" aria-label="4 by 4 grid">
                <div class="edit-controls" aria-label="grid input controls">
                    <label>
                        X
                        <input id="xInput" type="number" min="0" max="3" placeholder="x (0-3)">
                    </label>
                    <label>
                        Y
                        <input id="yInput" type="number" min="0" max="3" placeholder="y (0-3)">
                    </label>
                    <label>
                        Color
                        <input id="colorInput" type="text" placeholder="color">
                    </label>
                </div>
                <div class="edit-actions" aria-label="submit action">
                    <button id="submitBtn" type="button">Submit</button>
                </div>
                <p id="warningMessage" style="color: red; font-size: 12px; margin: 0;"></p>
                <div class="brush-mode">
                    <label for="brushModeSelect">画笔模式</label>
                    <select id="brushModeSelect" aria-label="switch brush mode">
                        <option value="1">1 * 1</option>
                        <option value="3">3 * 3</option>
                        <option value="5">5 * 5</option>
                        <option value="7">7 * 7</option>
                    </select>
                </div>

                <div class="line-tool" aria-label="line drawing tool">
                    <h3 class="line-tool-title">直线工具</h3>
                    <div class="line-controls" aria-label="line coordinates input">
                        <label>
                            起始X
                            <input id="startXInput" type="number" min="0" max="3" placeholder="0-3">
                        </label>
                        <label>
                            起始Y
                            <input id="startYInput" type="number" min="0" max="3" placeholder="0-3">
                        </label>
                        <label>
                            终止X
                            <input id="endXInput" type="number" min="0" max="3" placeholder="0-3">
                        </label>
                        <label>
                            终止Y
                            <input id="endYInput" type="number" min="0" max="3" placeholder="0-3">
                        </label>
                    </div>
                    <div class="line-actions" aria-label="draw line action">
                        <button id="drawLineBtn" type="button">绘制直线</button>
                    </div>
                </div>
                <div class="scale-switching" aria-label="scale switching">
                    <input id="scaleInput" type="number" placeholder="scale">
                    <button id="scaleBtn" type="button">调整</button>
                </div>
            </section>
        </section>

        <section class="editor-middle" aria-label="quick actions">
            <div class="middle-actions">
                <button id="fileListBtn" type="button">文件列表</button>
                <button id="onlineUsersBtn" type="button">在线用户列表</button>
                <div id="createFile">
                    <input placeholder="filename..." class="file-creation" id="fileNameInput">
                    <input placeholder="width" class="file-creation" id="widthInput">
                    <input placeholder="height" class="file-creation" id="heightInput">
                    <button id="createFileBtn" type="button">create</button>
                </div>
                <button id="deleteFileBtn" type="button">删除文件</button>
                <button id="undoBtn" type="button">撤销</button>
            </div>
            <div id="infoList" class="info-list"></div>
        </section>

        <aside class="editor-right" aria-label="operation log">
            <h2 class="log-title">操作记录</h2>
            <div id="opHistory" class="log-list" role="log" aria-label="operation history" aria-live="polite">
            </div>
        </aside>

        <canvas id="canvas" width="16" height="16"></canvas>
    </main>
</body>
<script src="js/websocket.js"></script>
</html>
