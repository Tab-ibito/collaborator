<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Collaborator Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="page-center">
    <section class="login-dialog">
        <h1 class="dialog-title">Collaborator Login</h1>
        <div class="dialog-content">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <p id="warningMessage" style="color: red; font-size: 12px; margin: 0;"></p>
            <div class="dialog-actions">
                <button id="loginButton" type="button">Login</button>
                <button id="signupButton" type="button">Signup</button>
            </div>
        </div>
    </section>
</main>
</body>
<script src="js/editor.js"></script>
</html>
